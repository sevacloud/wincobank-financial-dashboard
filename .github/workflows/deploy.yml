name: Deploy WordPress plugin via SFTP (IONOS)

on:
  push:
    branches: [main]
    paths:
      - 'quickfile-dashboard/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: quickfile-dashboard
        run: npm install

      - name: Build assets
        working-directory: quickfile-dashboard
        run: npm run build

      # ── Deploy ───────────────────────────────────────────────────────────────

      - name: Deploy via SFTP (lftp mirror)
        timeout-minutes: 15
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASS }}
          localDir: ./quickfile-dashboard/
          remoteDir: ${{ secrets.DEPLOY_PATH }}/quickfile-dashboard/
          restoreMTime: false
          parallel: 3
          options: >-
            --exclude-glob node_modules
            --exclude-glob assets/src
            --exclude-glob package.json
            --exclude-glob package-lock.json
            --exclude-glob .gitignore
