name: Deploy to WordPress

on:
  push:
    branches: [main]
    paths:
      - 'wincobank-dashboard/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Build & deploy plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wincobank-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: wincobank-dashboard
        run: npm ci

      - name: Build assets
        working-directory: wincobank-dashboard
        run: npm run build

      # ── Deploy ───────────────────────────────────────────────────────────────

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -az --delete --checksum \
            --exclude='node_modules/' \
            --exclude='assets/src/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='.gitignore' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes" \
            wincobank-dashboard/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/wincobank-dashboard/"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
