name: Deploy to WordPress

on:
  push:
    branches: [main]
    paths:
      - 'wincobank-dashboard/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Build & deploy plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wincobank-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: wincobank-dashboard
        run: npm ci

      - name: Build assets
        working-directory: wincobank-dashboard
        run: npm run build

      # ── Deploy ───────────────────────────────────────────────────────────────

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: sftp
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          local-dir: ./wincobank-dashboard/
          server-dir: ${{ secrets.DEPLOY_PATH }}/wincobank-dashboard/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            assets/src/**
            package.json
            package-lock.json
            .gitignore
